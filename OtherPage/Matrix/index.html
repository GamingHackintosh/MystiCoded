<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расчет Матрицы Судьбы</title>
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/fonts.css">
    <link rel="stylesheet" href="assets/css/Header.css">
    <link rel="stylesheet" href="assets/css/form.css">
    <link rel="stylesheet" href="assets/css/svg.css">
    <link rel="stylesheet" href="assets/css/Matrix.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="header-info">
                <h1>Расчет Матрицы Судьбы</h1>
            </div>
            <nav class="header-nav">
                <button class="tab" onclick= "location.href='../../index.html'" >Главная</button>
            </nav>
        </nav>
    </header>
    <main>
        <div class="container main">
            <section class="main-left">
                <form id="matrixForm" class="form form-matrixBox">
                    <div class="form_input">
                        <input id="name" type="text" placeholder="Ваше имя*" required>
                        <input id="dob" type="date" placeholder="Дата рождения*" required>
                    </div>
                    <button class="btn" type="submit">Рассчитать</button>
                </form>
            </section>
            <section class="main-right">
                <div class="image-container">
                    <img src="assets/img/background/background-1.webp" alt="main-right_img">
                    <div class="overlay"></div>
                    <div class="image-text">
                        <h2>Матрица Судьбы</h2>
                        <p>Узнайте свою судьбу и получите полезные советы для улучшения жизни.</p>
                    </div>
                </div>
            </section>            
        </div>

        <div class="container matrix">
            <section class="matrix-left">
                <div id="svg-container" class="svg-container"></div>
            </section>
            <section class="matrix-right">
                <div class="karta blockCalcTop">
                    <div class="title">Персональный расчет</div>
                    <div class="subtitle">Карта здоровья</div>
                    <table class="tabl">
                        <tbody>
                            <tr class="header-row">
                                <td>НАЗВАНИЕ ЧАКРЫ</td>
                                <td>ФИЗИКА</td>
                                <td>ЭНЕРГИЯ</td>
                                <td>ЭМОЦИИ</td>
                            </tr>
                            <tr class="chakra-row" style="background:#993399;">
                                <td id="chakra7">7. Сахасрара</td>
                                <td id="n33"></td>
                                <td id="n34"></td>
                                <td id="n35"></td>
                            </tr>
                            <tr class="chakra-row" style="background:#3366ff;">
                                <td id="chakra6">6. Аджна</td>
                                <td id="n36"></td>
                                <td id="n37"></td>
                                <td id="n38"></td>
                            </tr>
                            <tr class="chakra-row" style="background:#33ccff;">
                                <td id="chakra5">5. Вишудха</td>
                                <td id="n39"></td>
                                <td id="n40"></td>
                                <td id="n41"></td>
                            </tr>
                            <tr class="chakra-row" style="background:#66cc66;">
                                <td id="chakra4">4. Анахата</td>
                                <td id="n42"></td>
                                <td id="n43"></td>
                                <td id="n44"></td>
                            </tr>
                            <tr class="chakra-row" style="background:#ffff99;">
                                <td id="chakra3">3. Манипура</td>
                                <td id="n45"></td>
                                <td id="n46"></td>
                                <td id="n47"></td>
                            </tr>
                            <tr class="chakra-row" style="background:#ff9900;">
                                <td id="chakra2">2. Свадхистана</td>
                                <td id="n48"></td>
                                <td id="n49"></td>
                                <td id="n50"></td>
                            </tr>
                            <tr class="chakra-row" style="background:#cc3333;">
                                <td id="chakra1">1. Муладхара</td>
                                <td id="n51"></td>
                                <td id="n52"></td>
                                <td id="n53"></td>
                            </tr>
                            <tr class="total-row">
                                <td id="chakra">ИТОГО</td>
                                <td id="n54"></td>
                                <td id="n55"></td>
                                <td id="n56"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>    
    </main>

    <!-- SCRIPTS -->
    <script src="assets/js/matrix-calculator.js"></script>
</body>
</html>
