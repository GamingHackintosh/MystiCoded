<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Матрица Судьбы</title>
    <!--STYLE-->
    <link rel="stylesheet" href="frontend/css/reset.css">
    <link rel="stylesheet" href="frontend/css/main.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Matrix of Destiny</h1>
            <nav class="main-nav">
                <a href="#">Матрица Судьбы</a>
                <a href="#">Финансовые возможности</a>
                <a href="#">Совместимость</a>
                <a href="#">Детская Матрица</a>
                <a href="#">Дополнительные расчеты</a>
            </nav>
            <nav class="login-nav">
                <a href="login.html">Войти</a>
            </nav>
        </div>
    </header>
    <main>
        <div class="hero-section">
            <div class="blurred-bg"></div>
            <div class="hero-content">
                <h2>Рассчитать Матрицу Судьбы онлайн с расшифровкой</h2>
                <p>Введите дату рождения и бесплатно рассчитайте Матрицу Судьбы с расшифровкой</p>
                <form class="calculator-form">
                    <input type="text" placeholder="Ваше имя" required>
                    <div class="date-inputs">
                        <select required>
                            <option value="13">13</option>
                            <!-- Другие дни -->
                        </select>
                        <select required>
                            <option value="May">Май</option>
                            <!-- Другие месяцы -->
                        </select>
                        <select required>
                            <option value="2024">2024</option>
                            <!-- Другие годы -->
                        </select>
                    </div>
                    <button type="submit">Рассчитать</button>
                </form>
            </div>
        </div>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2024 Matrix of Destiny</p>
        </div>
    </footer>
</body>
</html>
