<!DOCTYPE html>
<html lang="ru">
<head>
    <title>MystiCoded - Расчёт вашей матрицы судьбы</title>
    <!--- Метатег --->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--- СТИЛИ --->
    <link rel="stylesheet" href="assets/css/adaptation.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/Date-Form.css">
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/root.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header_up">
        <div class="container">
            <div class="header_content">
                <div class="header_content-left">
                    <ul class="header_menu-left">
                        <li><i class="fa fa-home"></i> Главная</li>
                        <li><i class="fa fa-calculator"></i> Калькулятор</li>
                    </ul>                    
                </div>
            </div>
        </div>
    </header>
    <!-- HEADER-END -->

    <!-- MAIN -->
    <main>
        <div class="main-container">
            <div class="main-left">
                <div class="main-left__Title">
                    <h1>Расчёт матрицы судьбы</h1>
                </div>
                <form id="dateForm" class="date-form">
                    <label for="birthdate">Введите дату рождения:</label>
                    <input type="date" id="birthdate" required>
                    <button type="submit">Рассчитать</button>
                </form>
            </div>        
            <div class="main-right">
                <picture class="main-right__WelcomePicture">
                    <img class="main-right__Picture" src="assets/images/main-right/main-right_IMG.webp">
                </picture>
            </div>
        </div>
    </main>
    <!-- MAIN-END -->



    <script src="assets/js/Form.js"></script>
    <script src="https://kit.fontawesome.com/ca05fd3a6e.js" crossorigin="anonymous"></script>
</body>
</html>
