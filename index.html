<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Матрица Судьбы</title>
    <link rel="stylesheet" href="frontend/css/reset.css">
    <link rel="stylesheet" href="frontend/css/main.css">
    <link rel="stylesheet" href="frontend/css/fonts.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
</head>
<body>
    <header>
        <div class="container">
            <nav class="main-nav">
                <a href="#"><i class="fas fa-home"></i> Матрица Судьбы</a>
                <a href="#">Финансовые возможности</a>
                <a href="#">Совместимость</a>
                <a href="#">Детская Матрица</a>
            </nav>
            <nav class="Auth-nav">
                <a href="frontend/registration.html" id="showRegisterForm">Зарегистрироваться</a>
                <a href="frontend/login.html" id="showLoginForm">Войти</a>
            </nav>
        </div>
    </header>
    
    <main>
        <div class="hero-section">
            <div class="hero-content">
                <h2>Рассчитать Матрицу Судьбы онлайн с расшифровкой</h2>
                <p>Введите дату рождения и бесплатно рассчитайте Матрицу Судьбы с расшифровкой</p>
                <form class="calculator-form" id="calculatorForm">
                    <div class="form-buttons">
                        <button type="button">Матрица Судьбы</button>
                        <button type="button">Финансовые возможности</button>
                        <button type="button">Совместимость</button>
                        <button type="button">Детская Матрица</button>
                    </div>
                    <input type="text" placeholder="Ваше имя" required>
                    <div class="date-inputs">
                        <select id="day" required></select>
                        <select id="month" required></select>
                        <select id="year" required></select>
                    </div>
                    <button type="submit">Рассчитать</button>
                </form>
            </div>
        </div>
    </main>
    
    <footer>
        <div class="container">
            <p>&copy; 2024 Matrix of Destiny</p>
        </div>
    </footer>

    <!--- Forms (скрыто) --->
    <div id="registerForm" style="display:none;">
        <h2>Регистрация</h2>
        <form id="registerForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit">Зарегистрироваться</button>
        </form>
    </div>

    <div id="loginForm" style="display:none;">
        <h2>Вход</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
    </div>

    <!--- Scripts --->
    <script src="https://kit.fontawesome.com/ca05fd3a6e.js" crossorigin="anonymous"></script>
    <script src="js/main.js"></script>
    <script src="js/date-input.js"></script>
    <script src="js/register.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
