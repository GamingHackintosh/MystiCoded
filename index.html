<!DOCTYPE html>
<html lang="ru">
<head>
    <title>MystiCoded - Расчёт вашей матрицы судьбы</title>
    <!--- Метатег --->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--- СТИЛИ --->
    <link rel="stylesheet" href="assets/css/adaptation.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/Date-Form.css">
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/root.css">
    <!-- ШРИФТЫ -->
    
</head>
<body>
    <!-- HEADER -->
    <header class="header_up">
        <div class="container">
            <div class="header_content">
                <div class="header_content-left">
                    <ul class="header_menu-left">
                        <li><i class="fa fa-home"></i></li>
                        <li><i class="fa fa-calculator"></i> Калькулятор</li>
                    </ul>                    
                </div>
            </div>
        </div>
    </header>
    <!-- HEADER-END -->


    <!-- MAIN -->
    <main>
        <div class="main-container">
            <div class="main-container_input block10x10 blocktext">       
                <p class="inputi1669938916">РАССЧИТАТЬ
                    <strong class="inputi1669939104">&nbsp;МАТРИЦУ СУДЬБЫ</strong>
                </p>
                <p class="inputi1669938916">
                    <span class=" inputi1707160959">ОНЛАЙН С РАСШИФРОВКОЙ</span>
                </p> 
            </div>

            <div class="main-section">
                <div class="form-section">
                    <form id="dateForm">
                        <div class="input-group">
                            <label for="birthdate">Ваше имя*</label>
                            <input type="text" id="name" required placeholder="Введите ваше имя">
                        </div>
                        <div class="input-group">
                            <label for="birthdate">Дата рождения</label>
                            <input type="date" id="birthdate" required>
                        </div>
                        <button type="submit">Рассчитать</button>
                    </form>
                </div>
                <div class="tabs-section">
                    <button class="tab-button active">Матрица судьбы</button>
                    <button class="tab-button">Фин.возможности</button>
                    <button class="tab-button">Совместимость</button>
                    <button class="tab-button">Детская матрица</button>
                </div>
            </div>
        </div>        
    </main>
    <!-- MAIN-END -->



    <script src="assets/js/Form.js"></script>
    <script src="https://kit.fontawesome.com/ca05fd3a6e.js" crossorigin="anonymous"></script>

</html>
